  .card {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.1rem 1.25rem;

    transition: border-color 0.15s, box-shadow 0.15s;
    position: relative;

  .card.expanded { border-color: var(--border-hover); box-shadow: 0 2px 16px rgba(0,0,0,0.06); }

    position: absolute; top: 15px; right: 15px;
    font-size: 13px; color: var(--text-tertiary);

    background: var(--bg-secondary); border-radius: var(--radius-md);
    padding: 10px 14px; font-size: 13px; color: var(--text-primary); line-height: 1.6;

      'Чи повинні університети впроваджувати спеціальні програми протидії дискримінації та булінгу?',
      'Які механізми можуть забезпечити формування інклюзивної культури академічної спільноти?',
      'Чи може цифрове освітнє середовище посилювати соціальну нерівність серед студентів?'
    ]
  },
  {
    num: 11, color: 'c-amber', category: 'якість', categoryLabel: 'Якість',
    title: 'Система забезпечення якості вищої освіти',
    questions: [
      'Концептуальні засади забезпечення якості освіти відповідно до стандартів ESG',
      'Внутрішні системи забезпечення якості у закладах вищої освіти',
      'Освітня аналітика як інструмент управління якістю освіти',
      'Євроінтеграційні процеси у розвитку вищої освіти України'
    ],
    task: 'Провести аналіз освітньої програми на відповідність стандартам якості ESG',
    discussion: [
      'Наскільки ефективною є сучасна модель акредитації освітніх програм?',
      'Чи може система забезпечення якості функціонувати без культури академічної відповідальності?',
      'Чи здатна освітня аналітика (data-driven management) підвищити ефективність управління університетом?'
    ]
  }
];

const filterDefs = [
  { key: 'all',          label: 'Всі семінари' },
  { key: 'освіта',       label: 'Освітній процес' },
  { key: 'дослідження',  label: 'Наука і дослідження' },
  { key: 'психологія',   label: 'Психологія' },
  { key: 'якість',       label: 'Якість освіти' }
];

let activeFilter = 'all';

function buildFilters() {
  const el = document.getElementById('filters');
  filterDefs.forEach(f => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (f.key === 'all' ? ' active-all' : '');
    btn.textContent = f.label;
    btn.dataset.key = f.key;
    btn.onclick = () => {
      activeFilter = f.key;
      document.querySelectorAll('.filter-btn').forEach(b => {
        b.className = 'filter-btn';
      });
      btn.className = 'filter-btn active-' + f.key;
      renderGrid();
    };
    el.appendChild(btn);
  });
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderGrid() {
  const grid = document.getElementById('grid');
  const list = activeFilter === 'all' ? seminars : seminars.filter(s => s.category === activeFilter);

  grid.innerHTML = list.map((s, i) => {
    const preview = s.task.length > 90 ? s.task.substring(0, 90) + '…' : s.task;
    const qs = s.questions.map(q => `<li>${escHtml(q)}</li>`).join('');
    const disc = s.discussion.length
      ? `<div class="section-label">Питання для дискусії</div>
         <ul class="item-list disc-list">${s.discussion.map(d => `<li>${escHtml(d)}</li>`).join('')}</ul>`
      : '';
    return `
      <div class="card ${s.color}" id="card-${i}" onclick="toggle(${i})">
        <span class="expand-icon">↓</span>
        <div class="card-header">
          <div class="num-badge">${s.num}</div>
          <div class="card-title">${escHtml(s.title)}</div>
        </div>
        <div class="tags"><span class="tag">${escHtml(s.categoryLabel)}</span></div>
        <div class="task-preview">${escHtml(preview)}</div>
        <div class="details">
          <div class="section-label">Теоретичні питання</div>
          <ul class="item-list">${qs}</ul>
          <div class="section-label" style="margin-top:14px">Практичне завдання</div>
          <div class="task-box">${escHtml(s.task).replace(/\n/g,'<br>')}</div>
          ${disc}
        </div>
      </div>`;
  }).join('');
}

function toggle(i) {
  document.getElementById('card-' + i).classList.toggle('expanded');
}

buildFilters();
renderGrid();
</script>
</body>
</html>
